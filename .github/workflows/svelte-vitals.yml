# Generated by `svelte-vitals ci install`, then adjusted to match this repo's
# conventions (pinned checkout SHA, timeout, concurrency, paths-ignore).
# Re-run with --force to regenerate (re-apply the same adjustments after).
name: svelte-vitals

on:
  pull_request:
    paths-ignore:
      - '.vscode/**'
      - '**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  svelte-vitals:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: oekazuma/svelte-vitals/packages/action@86e84073bddea99530d2d6831378a68836443ee4 # @svelte-vitals/action@0.2.0
        with:
          diff: origin/${{ github.base_ref }}
          baseline: origin/${{ github.base_ref }}
